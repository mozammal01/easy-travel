services:
  - type: web
    name: meghjatra-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build --workspace packages/shared && npm run db:generate --workspace @meghjatra/api && npm run build --workspace @meghjatra/api
    startCommand: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: meghjatra-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false

databases:
  - name: meghjatra-db
    plan: starter
    region: oregon
